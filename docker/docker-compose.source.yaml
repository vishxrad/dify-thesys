# Source-build overlay for the repo-backed fork.
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.source.yaml up -d --build
#
# WARNING: this overlay sets FORCE_VERIFYING_SIGNATURE=false on the plugin
# daemon so the repo-bundled (unsigned) Thesys plugin can install for new
# tenants. Do not reuse this overlay in a production environment without
# understanding that any unsigned plugin package can be installed.
services:
  api:
    image: dify-api-source
    build:
      context: ..
      dockerfile: api/Dockerfile.source
    environment:
      PLUGIN_AUTO_INSTALL_LOCAL_PACKAGES: /app/local-plugins/thesys
      PLUGIN_AUTO_INSTALL_STRICT: "true"

  worker:
    image: dify-api-source

  worker_beat:
    image: dify-api-source

  web:
    image: dify-web-source
    build:
      context: ..
      dockerfile: web/Dockerfile.source

  plugin_daemon:
    environment:
      FORCE_VERIFYING_SIGNATURE: "false"
